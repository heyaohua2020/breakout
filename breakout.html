<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打砖块 Breakout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
  }
  canvas {
    border: 2px solid #2a2a4a;
    border-radius: 8px;
    background: #0f0f1f;
    display: block;
  }
  #ui-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #message {
    color: #fff;
    font-size: 28px;
    text-align: center;
    text-shadow: 0 0 20px rgba(100,150,255,0.5);
    pointer-events: none;
    display: none;
  }
  #message .sub {
    font-size: 16px;
    color: #8899cc;
    margin-top: 12px;
  }
  #ui-top {
    position: absolute;
    top: 12px; left: 0;
    width: 100%;
    padding: 0 24px;
    display: flex;
    justify-content: space-between;
    color: #aabbdd;
    font-size: 18px;
    font-weight: bold;
    pointer-events: none;
    user-select: none;
  }
  #ui-top .lives { color: #ff6666; }
</style>
</head>
<body>
<div style="position:relative; display:inline-block">
  <canvas id="gameCanvas" width="480" height="640"></canvas>
  <div id="ui-top">
    <span id="scoreDisplay">分数: 0</span>
    <span id="livesDisplay" class="lives">生命: ❤❤❤</span>
  </div>
  <div id="ui-overlay">
    <div id="message">
      按 空格键 或 回车键 发球 🎾
      <div class="sub">← → 移动挡板</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  打砖块 Breakout — 纯 HTML / Canvas 版
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 480, H = 640;

const msgEl = document.getElementById('message');
const scoreEl = document.getElementById('scoreDisplay');
const livesEl = document.getElementById('livesDisplay');

// ─── 常量 ───
const PADDLE_W = 100, PADDLE_H = 14, PADDLE_Y = 560, PADDLE_SPEED = 500;
const BALL_R = 6, BALL_SPEED = 350, BALL_MAX_SPEED = 550;
const BRICK_W = 52, BRICK_H = 18, BRICK_GAP = 4, BRICK_TOP = 70;
const BRICK_ROWS = 6, BRICK_COLS = 8;
const BRICK_COLORS = [
  '#ff4d4d', '#ff9900', '#ffe633', '#4dff4d', '#4d99ff', '#994dff'
];

// ─── 状态 ───
let paddle = { x: W / 2, y: PADDLE_Y, w: PADDLE_W, h: PADDLE_H };
let ball = { x: W / 2, y: PADDLE_Y - PADDLE_H / 2 - BALL_R - 2, r: BALL_R };
let ballVX = 0, ballVY = 0;
let ballAttached = true;
let score = 0, lives = 3;
let gameOver = false, won = false;

// 砖块
let bricks = [];

function createBricks() {
  bricks = [];
  const totalW = BRICK_COLS * (BRICK_W + BRICK_GAP) - BRICK_GAP;
  const startX = (W - totalW) / 2;
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      bricks.push({
        x: startX + c * (BRICK_W + BRICK_GAP),
        y: BRICK_TOP + r * (BRICK_H + BRICK_GAP),
        w: BRICK_W, h: BRICK_H,
        color: BRICK_COLORS[r % BRICK_COLORS.length],
        alive: true
      });
    }
  }
}

// ─── 按键 ───
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'Enter') {
    if (gameOver || won) { restartGame(); return; }
    if (ballAttached) {
      const angle = (Math.random() - 0.5) * 0.8;
      ballVX = Math.sin(angle) * BALL_SPEED;
      ballVY = -Math.cos(angle) * BALL_SPEED;
      ballAttached = false;
      msgEl.style.display = 'none';
    }
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ─── 更新 UI ───
function updateUI() {
  scoreEl.textContent = '分数: ' + score;
  livesEl.textContent = '生命: ' + '❤'.repeat(Math.max(0, lives));
}

function showMessage(text, sub) {
  msgEl.innerHTML = text + (sub ? '<div class="sub">' + sub + '</div>' : '');
  msgEl.style.display = 'block';
}

// ─── 重置球 ───
function resetBall() {
  ball.x = paddle.x;
  ball.y = PADDLE_Y - PADDLE_H / 2 - BALL_R - 2;
  ballVX = 0; ballVY = 0;
  ballAttached = true;
}

// ─── 重新开始 ───
function restartGame() {
  score = 0; lives = 3;
  gameOver = false; won = false;
  createBricks();
  resetBall();
  updateUI();
  msgEl.style.display = 'none';
}

// ─── 碰撞检测（球 vs 矩形） ───
function ballRectCollision(bx, by, bw, bh) {
  // 找球心到矩形最近的点
  const cx = Math.max(bx, Math.min(ball.x, bx + bw));
  const cy = Math.max(by, Math.min(ball.y, by + bh));
  const dx = ball.x - cx;
  const dy = ball.y - cy;
  return dx * dx + dy * dy < ball.r * ball.r;
}

// ─── 更新循环 ───
function update(dt) {
  if (gameOver || won) return;

  // 挡板
  let dir = 0;
  if (keys['ArrowLeft']) dir = -1;
  if (keys['ArrowRight']) dir = 1;
  paddle.x += dir * PADDLE_SPEED * dt;
  paddle.x = Math.max(PADDLE_W / 2 + 4, Math.min(W - PADDLE_W / 2 - 4, paddle.x));

  // 球附着
  if (ballAttached) {
    ball.x = paddle.x;
    return;
  }

  // 球移动
  ball.x += ballVX * dt;
  ball.y += ballVY * dt;

  // 墙壁反弹
  if (ball.x - ball.r < 0) { ball.x = ball.r; ballVX = -ballVX; }
  if (ball.x + ball.r > W) { ball.x = W - ball.r; ballVX = -ballVX; }
  if (ball.y - ball.r < 0) { ball.y = ball.r; ballVY = -ballVY; }

  // 出界
  if (ball.y > H + 30) {
    lives--;
    updateUI();
    if (lives <= 0) {
      gameOver = true;
      showMessage('游戏结束 😢', '按 空格键 重新开始');
    } else {
      resetBall();
      msgEl.style.display = 'block';
      msgEl.innerHTML = '还剩 ' + lives + ' 条命！ 按 空格键 发球';
    }
    return;
  }

  // 挡板碰撞
  if (ballVY > 0 &&
      ball.y + ball.r > paddle.y - paddle.h / 2 &&
      ball.y + ball.r < paddle.y + paddle.h / 2 &&
      ball.x > paddle.x - paddle.w / 2 &&
      ball.x < paddle.x + paddle.w / 2) {
    const hitOff = (ball.x - paddle.x) / (paddle.w / 2);
    const angle = Math.max(-1, Math.min(1, hitOff)) * 0.75;
    const speed = Math.min(Math.sqrt(ballVX * ballVX + ballVY * ballVY) + 8, BALL_MAX_SPEED);
    ballVX = Math.sin(angle) * speed;
    ballVY = -Math.cos(angle) * speed;
    ball.y = paddle.y - paddle.h / 2 - ball.r;
  }

  // 砖块碰撞
  let allGone = true;
  for (const brick of bricks) {
    if (!brick.alive) continue;
    allGone = false;

    if (ballRectCollision(brick.x, brick.y, brick.w, brick.h)) {
      brick.alive = false;
      score += 10;
      updateUI();

      // 判断反弹方向
      const cx = Math.max(brick.x, Math.min(ball.x, brick.x + brick.w));
      const cy = Math.max(brick.y, Math.min(ball.y, brick.y + brick.h));
      const dx = ball.x - cx;
      const dy = ball.y - cy;
      const overlapX = ball.r - Math.abs(dx);
      const overlapY = ball.r - Math.abs(dy);

      if (overlapX < overlapY) {
        ballVX = -ballVX;
      } else {
        ballVY = -ballVY;
      }
      // 弹开防止卡住
      ball.x += (ballVX > 0 ? 1 : -1) * 2;
      ball.y += (ballVY > 0 ? 1 : -1) * 2;

      // 一次只打碎一块砖
      break;
    }
  }

  // 通关检查
  const aliveCount = bricks.filter(b => b.alive).length;
  if (aliveCount === 0) {
    won = true;
    showMessage('🎉 恭喜通关！', '按 空格键 重新开始');
  }
}

// ─── 渲染 ───
function draw() {
  // 背景
  ctx.fillStyle = '#0f0f1f';
  ctx.fillRect(0, 0, W, H);

  // 砖块
  for (const brick of bricks) {
    if (!brick.alive) continue;
    ctx.fillStyle = brick.color;
    ctx.shadowColor = brick.color;
    ctx.shadowBlur = 8;
    ctx.fillRect(brick.x, brick.y, brick.w, brick.h);
    ctx.shadowBlur = 0;

    // 高光
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(brick.x + 2, brick.y + 2, brick.w - 4, 3);
  }

  // 挡板
  ctx.shadowColor = '#3399ff';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#3399ff';
  ctx.beginPath();
  const px = paddle.x - paddle.w / 2, py = paddle.y - paddle.h / 2;
  ctx.roundRect(px, py, paddle.w, paddle.h, 6);
  ctx.fill();
  ctx.shadowBlur = 0;

  // 球
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // 如果球附着在挡板上，画箭头提示
  if (ballAttached && !gameOver && !won) {
    ctx.fillStyle = 'rgba(150, 180, 255, 0.4)';
    ctx.font = '16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('按 空格 / Enter 发球', W / 2, PADDLE_Y + 50);
  }
}

// 扩展 CanvasRenderingContext2D 支持圆角矩形
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (r > w / 2) r = w / 2;
    if (r > h / 2) r = h / 2;
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
  };
}

// ═══════════════════════════════════════════════════════════════
//  主循环
// ═══════════════════════════════════════════════════════════════
let lastTime = 0;

function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

// 启动
createBricks();
updateUI();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
